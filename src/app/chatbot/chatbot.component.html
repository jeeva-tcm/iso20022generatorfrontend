<!-- Floating Chat Button -->
<div class="chatbot-fab" (click)="toggleChat()" [class.open]="isOpen">
    <div class="fab-icon">
        <svg *ngIf="!isOpen" xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
        </svg>
        <svg *ngIf="isOpen" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
    </div>
    <span class="fab-badge" *ngIf="unreadCount > 0">{{ unreadCount }}</span>
    <div class="fab-pulse" *ngIf="!isOpen"></div>
</div>

<!-- Chat Window -->
<div class="chatbot-window" [class.visible]="isOpen" [class.minimized]="isMinimized">
    <!-- Header -->
    <div class="chat-header">
        <div class="header-left">
            <div class="header-avatar">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <path d="M8 14s1.5 2 4 2 4-2 4-2"></path>
                    <line x1="9" y1="9" x2="9.01" y2="9"></line>
                    <line x1="15" y1="9" x2="15.01" y2="9"></line>
                </svg>
            </div>
            <div class="header-info">
                <span class="header-title">ISO 20022 Assistant</span>
                <span class="header-status">
                    <span class="status-dot"></span>
                    {{ stats?.status === 'ready' ? stats.total_chunks + ' knowledge chunks' : 'Initializing...' }}
                </span>
            </div>
        </div>
        <div class="header-actions">
            <button class="header-btn" title="Upload reference document" (click)="triggerUpload()">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="17 8 12 3 7 8"></polyline>
                    <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
            </button>
            <button class="header-btn" title="Rebuild knowledge base" (click)="rebuildIndex()">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2">
                    <polyline points="23 4 23 10 17 10"></polyline>
                    <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                </svg>
            </button>
            <button class="header-btn close-btn" title="Close" (click)="closeChat()">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>
    </div>

    <!-- Hidden file input -->
    <input type="file" #fileInput style="display:none" (change)="onFileSelected($event)"
        accept=".txt,.json,.xml,.xsd,.csv,.md">

    <!-- Messages -->
    <div class="chat-messages" #messagesContainer>
        <ng-container *ngFor="let msg of messages">
            <!-- User message -->
            <div class="message user-message" *ngIf="msg.role === 'user'">
                <div class="message-bubble user-bubble">
                    <div class="message-text" [innerHTML]="formatMessage(msg.content)"></div>
                </div>
            </div>

            <!-- Bot message -->
            <div class="message bot-message" *ngIf="msg.role === 'bot'">
                <div class="message-avatar">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <path d="M8 14s1.5 2 4 2 4-2 4-2"></path>
                        <line x1="9" y1="9" x2="9.01" y2="9"></line>
                        <line x1="15" y1="9" x2="15.01" y2="9"></line>
                    </svg>
                </div>
                <div class="message-bubble bot-bubble">
                    <!-- Loading state -->
                    <div class="typing-indicator" *ngIf="msg.isLoading">
                        <span></span><span></span><span></span>
                    </div>
                    <!-- Answer -->
                    <div class="message-text" *ngIf="!msg.isLoading" [innerHTML]="formatMessage(msg.content)"></div>
                    <!-- Sources -->
                    <div class="message-sources" *ngIf="msg.sources && msg.sources.length > 0">
                        <div class="sources-label">📎 Sources:</div>
                        <div class="source-chip" *ngFor="let src of msg.sources">
                            {{ src.file }}
                        </div>
                    </div>
                    <!-- Processing time -->
                    <div class="message-meta" *ngIf="msg.processing_time_ms">
                        ⚡ {{ msg.processing_time_ms }}ms
                    </div>
                </div>
            </div>

            <!-- System message -->
            <div class="message system-message" *ngIf="msg.role === 'system'">
                <div class="system-bubble" [innerHTML]="formatMessage(msg.content)"></div>
            </div>
        </ng-container>

        <!-- Suggestions (show when no messages or after greeting) -->
        <div class="suggestions-container" *ngIf="messages.length <= 1 && suggestions.length > 0">
            <div class="suggestions-title">💡 Try asking:</div>
            <div class="suggestion-chips">
                <button class="suggestion-chip" *ngFor="let s of suggestions.slice(0, 6)" (click)="useSuggestion(s)">
                    {{ s }}
                </button>
            </div>
        </div>
    </div>

    <!-- Input Area -->
    <div class="chat-input-area">
        <div class="input-wrapper">
            <textarea class="chat-input" [(ngModel)]="userInput" (keydown)="onKeyDown($event)"
                placeholder="Ask about ISO 20022, SWIFT messages..." rows="1"
                [disabled]="isLoading"></textarea>
            <button class="send-btn" (click)="send()" [disabled]="!userInput.trim() || isLoading">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
        <div class="input-hint">Press Enter to send • Shift+Enter for new line</div>
    </div>
</div>
